# weid.fun · nginx 配置
# 部署位置：/etc/nginx/conf.d/weid.fun.conf
# SSL 证书位置（参见 docs/deployment/2026-04-09-ssl证书部署.md）：
#   /etc/ssl/weid.fun/fullchain.pem
#   /etc/ssl/weid.fun/privkey.pem

# HTTP -> HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name weid.fun www.weid.fun;

    # Let's Encrypt webroot challenge（留一个通道供 acme.sh 使用 webroot 模式续签）
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name weid.fun www.weid.fun;

    root /var/www/weid.fun;
    index index.html;

    ssl_certificate     /etc/ssl/weid.fun/fullchain.pem;
    ssl_certificate_key /etc/ssl/weid.fun/privkey.pem;

    # SSL 硬化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ⚠️ 安全头 —— 必须在每个 location 里都重复一遍。
    # 原因：nginx `add_header` 不跨 location 继承。只要 location block 里
    # 有任何 `add_header`，它就会屏蔽掉父级 server block 里所有的 add_header。
    # 所以 server 级别写只是无效的好看，实际生效要靠各 location 重复。

    # 静态资源缓存
    location ~* \.(js|css|woff2?|ttf|svg|webp|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests" always;
        try_files $uri =404;
    }

    # HTML 不缓存（让部署立即生效）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; upgrade-insecure-requests" always;
        try_files $uri =404;
    }

    # 默认路由
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # 隐藏 nginx 版本
    server_tokens off;

    access_log /var/log/nginx/weid.fun.access.log;
    error_log  /var/log/nginx/weid.fun.error.log;
}
